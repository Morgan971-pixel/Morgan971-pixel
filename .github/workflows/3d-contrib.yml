name: Generate 3D Contribution Graph

on:
  schedule:
    - cron: "0 18 * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    name: Generate 3D Contribution Graph
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v3

      - name: Write settings file
        run: |
          cat > /tmp/3d-settings.json << 'SETTINGS'
          {
            "githubUserName": "Morgan971-pixel",
            "type": "gitHub",
            "backgroundColor": "#182A35",
            "foregroundColor": "#1C3040",
            "guideColor": "#2a4560",
            "branchColor": "#FF571C",
            "commitColor": "#FF571C",
            "otherColor": "#c084fc",
            "strongColor": "#FF571C",
            "weekLabelColor": "#94a3b8",
            "dateRangeValue": 1
          }
          SETTINGS

      - uses: yoshi389111/github-profile-3d-contrib@0.7.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          USERNAME: ${{ github.repository_owner }}
          SETTING_JSON: /tmp/3d-settings.json

      - name: Commit and Push
        run: |
          git config user.email "action@github.com"
          git config user.name "GitHub Action"
          git add -A .
          git diff --staged --quiet || git commit -m "Update 3D contribution graph"
          git push
